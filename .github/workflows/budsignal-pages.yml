name: Deploy BudSignal to GitHub Pages

# Two jobs so the site deploys whichever Pages source is configured in
# Settings -> Pages:
#   - deploy-actions serves it when Source = "GitHub Actions"
#   - deploy-branch publishes gh-pages, which serves it when
#     Source = "Deploy from a branch"
# The job matching the other mode fails or is ignored harmlessly.

on:
  push:
    branches: [master]
    paths:
      - 'budsignal/**'
      - '.github/workflows/budsignal-pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: budsignal-pages
  cancel-in-progress: true

jobs:
  deploy-actions:
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: budsignal
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish budsignal/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./budsignal
          force_orphan: true
          commit_message: 'Deploy BudSignal ${{ github.sha }}'
