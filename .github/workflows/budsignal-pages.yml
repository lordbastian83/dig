name: Deploy BudSignal to GitHub Pages

# Publishes budsignal/ to the gh-pages branch. The repo's Actions token is
# not allowed to create a Pages site via the Pages API (configure-pages
# enablement fails with "Resource not accessible by integration"), so this
# uses the classic branch-based flow instead: GitHub serves the site from
# gh-pages once Pages is on (Settings -> Pages -> Deploy from a branch ->
# gh-pages, one-time if it doesn't enable automatically).

on:
  push:
    branches: [master]
    paths:
      - 'budsignal/**'
      - '.github/workflows/budsignal-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: budsignal-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish budsignal/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./budsignal
          force_orphan: true
          commit_message: 'Deploy BudSignal ${{ github.sha }}'
