# Legacy Flutter wallet app CI. Manual-only — see build.yml note.

name: Flutter CI

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: |
        cd flutter
        flutter pub get

    - run: |
        cd flutter
        dart format --set-exit-if-changed .

    - run: |
       cd flutter
       flutter analyze .

    - run: |
       cd flutter
       flutter test

    - run: |
       cd flutter
       flutter build apk

    - uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: flutter/build/app/outputs/apk/release/app-release.apk
