# Legacy dig chain binaries. Manual-only: the repo's active work is budsignal/hedgedesk,
# and running this on every push produced a failure email per push (deprecated actions).
# Trigger from the Actions tab when you actually need binaries.

name: compile dig

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        targetos: [darwin, linux]
        include:
          - targetos: windows
            arch: amd64
    name: dig ${{ matrix.arch }} for ${{ matrix.targetos }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.17'

      - name: Compile dig
        env:
          GOOS: ${{ matrix.targetos }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go mod download
          cd cmd/digd
          go build .

      - name: Compile airdrop
        env:
          GOOS: ${{ matrix.targetos }}
          GOARCH: ${{ matrix.arch }}
        run: |
          cd airdrop
          go mod download
          go build .

      - uses: actions/upload-artifact@v4
        with:
          name: digd ${{ matrix.targetos }} ${{ matrix.arch }}
          path: cmd/digd
