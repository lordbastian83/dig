# CI/CD for the AI Hedge Fund Desk.
#   - test:   runs the offline suite on every push/PR touching hedgedesk/
#   - deploy: builds the image in ACR and rolls the Container App to it
#             (only on master, and only if Azure creds are configured)
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   AZURE_CREDENTIALS  — output of:
#     az ad sp create-for-rbac --name hedgedesk-ci --role contributor \
#       --scopes /subscriptions/<SUB>/resourceGroups/hedgedesk-rg --sdk-auth
#   Plus (Secrets): ANTHROPIC_API_KEY, and optionally OPENBB_PAT.
# The infra must already exist once (run deploy/azure/deploy.sh locally first);
# this workflow then keeps it updated on every push.
name: hedgedesk-deploy

on:
  push:
    branches: [master]
    paths: ['hedgedesk/**', '.github/workflows/hedgedesk-deploy.yml']
  pull_request:
    paths: ['hedgedesk/**']
  workflow_dispatch:

env:
  RG: hedgedesk-rg
  APP_NAME: hedgedesk
  ACR: ${{ vars.HEDGEDESK_ACR }}        # set as a repo variable after first deploy

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hedgedesk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test (offline suite)
        run: pytest -q

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build image in ACR
        run: |
          TAG="${GITHUB_SHA::7}"
          az acr build -r "$ACR" -t "hedgedesk:$TAG" \
            -f hedgedesk/deploy/Dockerfile hedgedesk
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"
      - name: Roll Container App to new image
        run: |
          ACR_SERVER="$(az acr show -n "$ACR" -g "$RG" --query loginServer -o tsv)"
          az containerapp update -g "$RG" -n "$APP_NAME" \
            --image "$ACR_SERVER/hedgedesk:${IMAGE_TAG}"
      - name: Show URL + health
        run: |
          FQDN="$(az containerapp show -g "$RG" -n "$APP_NAME" \
            --query properties.configuration.ingress.fqdn -o tsv)"
          echo "Deployed: https://$FQDN"
          curl -fsS "https://$FQDN/health" || echo "health not ready yet"
