# Azure Container App definition for the 24/7 desk.
# Deploy with: az containerapp create ... --yaml deploy/azure/containerapp.yaml
# Replace <ACR>, <SUBSCRIPTION>, and Key Vault refs for your environment.
properties:
  managedEnvironmentId: /subscriptions/<SUBSCRIPTION>/resourceGroups/hedgedesk-rg/providers/Microsoft.App/managedEnvironments/hedgedesk-env
  configuration:
    activeRevisionsMode: Single
    secrets:
      # Pulled from Key Vault via the app's managed identity.
      - name: anthropic-key
        keyVaultUrl: https://hedgedesk-kv.vault.azure.net/secrets/anthropic-key
        identity: system
      - name: openbb-pat
        keyVaultUrl: https://hedgedesk-kv.vault.azure.net/secrets/openbb-pat
        identity: system
  template:
    # Exactly one desk. A committee is not horizontally scalable — never run two.
    scale:
      minReplicas: 1
      maxReplicas: 1
    containers:
      - name: hedgedesk
        image: <ACR>.azurecr.io/hedgedesk:latest
        resources:
          cpu: 1.0
          memory: 2Gi
        args: ["watch", "AAPL", "MSFT", "NVDA", "--every-min", "240"]
        env:
          - name: ANTHROPIC_API_KEY
            secretRef: anthropic-key
          - name: OPENBB_PAT
            secretRef: openbb-pat
          - name: HEDGEDESK_MODEL
            value: claude-fable-5
        volumeMounts:
          - volumeName: desk-runs
            mountPath: /app/runs      # append-only audit ledger — must persist
    volumes:
      - name: desk-runs
        storageType: AzureFile
        storageName: desk-runs        # registered on the Container Apps environment
identity:
  type: SystemAssigned                # grant it 'get' on the Key Vault secrets
